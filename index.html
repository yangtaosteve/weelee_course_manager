<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markdown Directory Viewer</title>
    <style>
      :root {
        --bg: #edf4ff;
        --panel: rgba(248, 251, 255, 0.92);
        --panel-strong: #fcfdff;
        --text: #172033;
        --muted: #5f6e8a;
        --border: rgba(59, 91, 138, 0.16);
        --accent: #2f6fdf;
        --accent-soft: rgba(47, 111, 223, 0.12);
        --shadow: 0 18px 50px rgba(36, 71, 126, 0.12);
        --mono: "SFMono-Regular", "Menlo", "Consolas", monospace;
        --sans: "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        height: 100vh;
        overflow: hidden;
        font-family: var(--sans);
        font-size: 12pt;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(47, 111, 223, 0.18), transparent 32%),
          radial-gradient(circle at right 20%, rgba(45, 136, 187, 0.14), transparent 28%),
          linear-gradient(135deg, #f3f8ff 0%, #dfecff 100%);
      }

      .shell {
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 20px;
        height: 100vh;
        padding: 16px;
        overflow: hidden;
      }

      .panel {
        background: var(--panel);
        backdrop-filter: blur(18px);
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: var(--shadow);
      }

      .sidebar {
        display: flex;
        flex-direction: column;
        overflow: hidden;
        min-height: 0;
      }

      .sidebar-header {
        padding: 16px 16px 12px;
        border-bottom: 1px solid var(--border);
      }

      .sidebar-header h1 {
        margin: 0 0 6px;
        font-size: 1.05rem;
      }

      .sidebar-header p {
        margin: 0;
        color: var(--muted);
        font-size: 0.82rem;
        line-height: 1.35;
      }

      .directory-path {
        margin-top: 6px;
        color: var(--muted);
        font-size: 0.75rem;
        line-height: 1.35;
        word-break: break-all;
      }

      .controls {
        display: grid;
        gap: 8px;
        margin-top: 12px;
      }

      .filter-select {
        width: 100%;
        padding: 7px 10px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.72);
        color: var(--text);
        font: inherit;
        outline: none;
      }

      button {
        cursor: pointer;
        border: 1px solid var(--border);
        border-radius: 10px;
        font: inherit;
      }

      .primary-button {
        padding: 8px 12px;
        color: #f7fbff;
        background: linear-gradient(135deg, #3d82f0 0%, #285fcd 100%);
        transition: transform 160ms ease, box-shadow 160ms ease;
        box-shadow: 0 10px 24px rgba(47, 111, 223, 0.24);
      }

      .primary-button:hover {
        transform: translateY(-1px);
      }

      .secondary-button {
        padding: 7px 10px;
        color: var(--accent);
        background: rgba(255, 255, 255, 0.6);
      }

      .danger-button {
        padding: 7px 10px;
        color: #c03d52;
        background: rgba(255, 255, 255, 0.7);
      }

      .secondary-button:disabled,
      .danger-button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      .file-list {
        padding: 8px;
        overflow-y: scroll;
        overflow-x: scroll;
        scrollbar-gutter: stable;
      }

      .file-list-empty {
        padding: 10px;
        color: var(--muted);
        font-size: 0.8rem;
      }

      .file-item {
        width: 100%;
        padding: 8px 10px;
        border: 0;
        background: transparent;
        color: var(--text);
        text-align: left;
        border-radius: 10px;
        box-shadow: none;
        font-size: 0.82rem;
      }

      .file-item:hover,
      .file-item.active {
        background: var(--accent-soft);
        color: var(--accent);
      }

      .file-item.dragging {
        opacity: 0.45;
      }

      .file-item.drop-target {
        outline: 2px dashed rgba(47, 111, 223, 0.45);
        outline-offset: -2px;
        background: rgba(47, 111, 223, 0.08);
      }

      .viewer {
        display: flex;
        flex-direction: column;
        overflow: hidden;
        min-height: 0;
      }

      .viewer-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
      }

      .viewer-header h2 {
        margin: 0;
        font-size: 0.88rem;
      }

      .viewer-header span {
        color: var(--muted);
        font-size: 0.74rem;
      }

      .viewer-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .viewer-body {
        display: grid;
        grid-template-columns: minmax(280px, var(--editor-size, 48%)) 14px minmax(280px, 1fr);
        min-height: 0;
        overflow: hidden;
      }

      .editor-pane,
      .preview-pane {
        min-height: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .pane-header {
        padding: 8px 12px;
        border-bottom: 1px solid var(--border);
        color: var(--muted);
        font-size: 0.74rem;
        letter-spacing: 0.02em;
        background: rgba(255, 255, 255, 0.35);
      }

      .splitter {
        position: relative;
        cursor: col-resize;
        background: rgba(59, 91, 138, 0.08);
        transition: background 120ms ease;
      }

      .splitter::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        width: 4px;
        height: 54px;
        border-radius: 999px;
        background: rgba(47, 111, 223, 0.45);
        transform: translate(-50%, -50%);
      }

      .splitter:hover,
      .splitter.dragging {
        background: rgba(47, 111, 223, 0.12);
      }

      .editor-input,
      .preview-scroll {
        flex: 1;
        min-height: 0;
        height: 100%;
        overflow-y: scroll;
        overflow-x: scroll;
        scrollbar-gutter: stable;
      }

      .file-list::-webkit-scrollbar,
      .editor-input::-webkit-scrollbar,
      .preview-scroll::-webkit-scrollbar {
        width: 12px;
        height: 12px;
      }

      .file-list::-webkit-scrollbar-track,
      .editor-input::-webkit-scrollbar-track,
      .preview-scroll::-webkit-scrollbar-track {
        background: rgba(59, 91, 138, 0.08);
        border-radius: 999px;
      }

      .file-list::-webkit-scrollbar-thumb,
      .editor-input::-webkit-scrollbar-thumb,
      .preview-scroll::-webkit-scrollbar-thumb {
        background: rgba(47, 111, 223, 0.45);
        border: 2px solid transparent;
        background-clip: padding-box;
        border-radius: 999px;
      }

      .file-list::-webkit-scrollbar-thumb:hover,
      .editor-input::-webkit-scrollbar-thumb:hover,
      .preview-scroll::-webkit-scrollbar-thumb:hover {
        background: rgba(47, 111, 223, 0.65);
        border: 2px solid transparent;
        background-clip: padding-box;
      }

      .editor-input {
        width: 100%;
        padding: 12px 14px;
        border: 0;
        resize: none;
        background: rgba(252, 254, 255, 0.78);
        color: var(--text);
        font: 12px/1.45 var(--mono);
        outline: none;
      }

      .preview-scroll {
        padding: 16px;
      }

      .empty {
        height: 100%;
        display: grid;
        place-items: center;
        text-align: center;
        color: var(--muted);
        line-height: 1.45;
        font-size: 0.82rem;
      }

      .markdown {
        max-width: 880px;
        margin: 0 auto;
        font-size: 0.82rem;
        line-height: 1.5;
      }

      .markdown h1,
      .markdown h2,
      .markdown h3,
      .markdown h4,
      .markdown h5,
      .markdown h6 {
        line-height: 1.3;
        margin: 1.1em 0 0.45em;
      }

      .markdown h1 {
        font-size: 1.45rem;
      }

      .markdown h2 {
        font-size: 1.2rem;
      }

      .markdown h3 {
        font-size: 1.02rem;
      }

      .markdown h4 {
        font-size: 0.92rem;
      }

      .markdown h5 {
        font-size: 0.84rem;
      }

      .markdown h6 {
        font-size: 0.78rem;
      }

      .markdown p,
      .markdown ul,
      .markdown ol,
      .markdown blockquote,
      .markdown pre {
        margin: 0 0 0.7rem;
      }

      .markdown code {
        font-family: var(--mono);
        font-size: 0.88em;
        padding: 0.1em 0.3em;
        border-radius: 6px;
        background: rgba(40, 95, 205, 0.08);
      }

      .markdown pre {
        padding: 12px;
        overflow: auto;
        border-radius: 12px;
        background: #14233f;
        color: #edf4ff;
      }

      .markdown pre code {
        padding: 0;
        background: transparent;
        color: inherit;
      }

      .markdown blockquote {
        padding: 0.15rem 0 0.15rem 0.75rem;
        border-left: 4px solid rgba(47, 111, 223, 0.35);
        color: #53627d;
      }

      .markdown a {
        color: var(--accent);
      }

      .footnote {
        margin-top: 8px;
        color: var(--muted);
        font-size: 0.72rem;
        word-break: break-all;
      }

      @media (max-width: 900px) {
        body {
          overflow: auto;
          height: auto;
        }

        .shell {
          grid-template-columns: 1fr;
          height: auto;
          min-height: 100vh;
          overflow: visible;
        }

        .sidebar {
          max-height: 45vh;
        }

        .viewer-body {
          grid-template-columns: 1fr;
          grid-template-rows: minmax(220px, 1fr) 14px minmax(220px, 1fr);
        }

        .splitter {
          cursor: row-resize;
        }

        .splitter::before {
          width: 54px;
          height: 4px;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <aside class="panel sidebar">
        <div class="sidebar-header">
          <h1>Markdown 目录浏览</h1>
          <p>选择本地目录后，递归扫描所有子目录中的 `.md` 文件。</p>
          <div id="directory-path" class="directory-path">当前目录：未选择</div>
          <div class="controls">
            <button id="open-directory" class="primary-button" type="button">
              选择目录
            </button>
            <select id="file-filter" class="filter-select">
              <option value="all">全部 .md</option>
              <option value="typesetter">仅 .typesetter.md</option>
              <option value="writer">仅 .writer.md</option>
            </select>
          </div>
          <div class="footnote" id="status">未选择目录</div>
        </div>
        <div class="file-list" id="file-list"></div>
      </aside>

      <section class="panel viewer">
        <header class="viewer-header">
          <div>
            <h2 id="viewer-title">未打开文件</h2>
            <span id="viewer-path">请选择左侧 Markdown 文件</span>
          </div>
          <div class="viewer-actions">
            <button id="save-file" class="secondary-button" type="button" disabled>
              保存
            </button>
            <button id="delete-file" class="danger-button" type="button" disabled>
              删除
            </button>
          </div>
        </header>
        <div class="viewer-body" id="viewer-body">
          <section class="editor-pane">
            <div class="pane-header">编辑</div>
            <textarea
              id="editor-input"
              class="editor-input"
              spellcheck="false"
              placeholder="点击左侧文件后可在这里编辑 Markdown"
            ></textarea>
          </section>
          <div id="splitter" class="splitter" aria-label="拖动调整编辑区和预览区高度"></div>
          <section class="preview-pane">
            <div class="pane-header">预览</div>
            <div class="preview-scroll" id="preview-body">
              <div class="empty">点击左侧“选择目录”开始浏览本地 Markdown。</div>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script src="./node_modules/marked/lib/marked.umd.js"></script>
    <script src="./renderer.js"></script>
  </body>
  </html>
