<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markdown Directory Viewer</title>
    <style>
      :root {
        --bg: #f4efe7;
        --panel: rgba(255, 251, 245, 0.92);
        --panel-strong: #fffdf8;
        --text: #1f1a17;
        --muted: #6d6257;
        --border: rgba(97, 77, 59, 0.16);
        --accent: #b24c2e;
        --accent-soft: rgba(178, 76, 46, 0.12);
        --shadow: 0 18px 50px rgba(84, 57, 36, 0.12);
        --mono: "SFMono-Regular", "Menlo", "Consolas", monospace;
        --sans: "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        height: 100vh;
        overflow: hidden;
        font-family: var(--sans);
        font-size: 15px;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(178, 76, 46, 0.18), transparent 32%),
          radial-gradient(circle at right 20%, rgba(42, 104, 92, 0.16), transparent 28%),
          linear-gradient(135deg, #f7f2ea 0%, #f1e5d4 100%);
      }

      .shell {
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 20px;
        height: 100vh;
        padding: 24px;
        overflow: hidden;
      }

      .panel {
        background: var(--panel);
        backdrop-filter: blur(18px);
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: var(--shadow);
      }

      .sidebar {
        display: flex;
        flex-direction: column;
        overflow: hidden;
        min-height: 0;
      }

      .sidebar-header {
        padding: 24px 24px 16px;
        border-bottom: 1px solid var(--border);
      }

      .sidebar-header h1 {
        margin: 0 0 8px;
        font-size: 1.28rem;
      }

      .sidebar-header p {
        margin: 0;
        color: var(--muted);
        font-size: 0.94rem;
        line-height: 1.5;
      }

      .controls {
        display: grid;
        gap: 12px;
        margin-top: 18px;
      }

      button {
        cursor: pointer;
        border: 1px solid var(--border);
        border-radius: 16px;
        font: inherit;
      }

      .primary-button {
        padding: 11px 14px;
        color: #fff7f2;
        background: linear-gradient(135deg, #bd5737 0%, #93412b 100%);
        transition: transform 160ms ease, box-shadow 160ms ease;
        box-shadow: 0 10px 24px rgba(178, 76, 46, 0.24);
      }

      .primary-button:hover {
        transform: translateY(-1px);
      }

      .secondary-button {
        padding: 9px 13px;
        color: var(--accent);
        background: rgba(255, 255, 255, 0.6);
      }

      .secondary-button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      .file-list {
        padding: 12px;
        overflow-y: scroll;
        overflow-x: scroll;
        scrollbar-gutter: stable;
      }

      .file-list-empty {
        padding: 16px;
        color: var(--muted);
      }

      .file-item {
        width: 100%;
        padding: 11px 13px;
        border: 0;
        background: transparent;
        color: var(--text);
        text-align: left;
        border-radius: 14px;
        box-shadow: none;
        font-size: 0.94rem;
      }

      .file-item:hover,
      .file-item.active {
        background: var(--accent-soft);
        color: var(--accent);
      }

      .viewer {
        display: flex;
        flex-direction: column;
        overflow: hidden;
        min-height: 0;
      }

      .viewer-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 22px 26px;
        border-bottom: 1px solid var(--border);
      }

      .viewer-header h2 {
        margin: 0;
        font-size: 1rem;
      }

      .viewer-header span {
        color: var(--muted);
        font-size: 0.86rem;
      }

      .viewer-actions {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .viewer-body {
        display: grid;
        grid-template-rows: minmax(180px, var(--editor-height, 48%)) 14px minmax(180px, 1fr);
        min-height: 0;
        overflow: hidden;
      }

      .editor-pane,
      .preview-pane {
        min-height: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .editor-pane {
        border-bottom: 0;
      }

      .pane-header {
        padding: 12px 18px;
        border-bottom: 1px solid var(--border);
        color: var(--muted);
        font-size: 0.84rem;
        letter-spacing: 0.02em;
        background: rgba(255, 255, 255, 0.35);
      }

      .splitter {
        position: relative;
        cursor: row-resize;
        background: rgba(97, 77, 59, 0.08);
        transition: background 120ms ease;
      }

      .splitter::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        width: 54px;
        height: 4px;
        border-radius: 999px;
        background: rgba(178, 76, 46, 0.45);
        transform: translate(-50%, -50%);
      }

      .splitter:hover,
      .splitter.dragging {
        background: rgba(178, 76, 46, 0.12);
      }

      .editor-input,
      .preview-scroll {
        flex: 1;
        min-height: 0;
        height: 100%;
        overflow-y: scroll;
        overflow-x: scroll;
        scrollbar-gutter: stable;
      }

      .file-list::-webkit-scrollbar,
      .editor-input::-webkit-scrollbar,
      .preview-scroll::-webkit-scrollbar {
        width: 12px;
        height: 12px;
      }

      .file-list::-webkit-scrollbar-track,
      .editor-input::-webkit-scrollbar-track,
      .preview-scroll::-webkit-scrollbar-track {
        background: rgba(97, 77, 59, 0.08);
        border-radius: 999px;
      }

      .file-list::-webkit-scrollbar-thumb,
      .editor-input::-webkit-scrollbar-thumb,
      .preview-scroll::-webkit-scrollbar-thumb {
        background: rgba(178, 76, 46, 0.45);
        border: 2px solid transparent;
        background-clip: padding-box;
        border-radius: 999px;
      }

      .file-list::-webkit-scrollbar-thumb:hover,
      .editor-input::-webkit-scrollbar-thumb:hover,
      .preview-scroll::-webkit-scrollbar-thumb:hover {
        background: rgba(178, 76, 46, 0.65);
        border: 2px solid transparent;
        background-clip: padding-box;
      }

      .editor-input {
        width: 100%;
        padding: 18px 20px;
        border: 0;
        resize: none;
        background: rgba(255, 253, 248, 0.72);
        color: var(--text);
        font: 14px/1.65 var(--mono);
        outline: none;
      }

      .preview-scroll {
        padding: 24px;
      }

      .empty {
        height: 100%;
        display: grid;
        place-items: center;
        text-align: center;
        color: var(--muted);
        line-height: 1.7;
      }

      .markdown {
        max-width: 880px;
        margin: 0 auto;
        font-size: 0.95rem;
        line-height: 1.68;
      }

      .markdown h1,
      .markdown h2,
      .markdown h3,
      .markdown h4,
      .markdown h5,
      .markdown h6 {
        line-height: 1.3;
        margin: 1.5em 0 0.7em;
      }

      .markdown p,
      .markdown ul,
      .markdown ol,
      .markdown blockquote,
      .markdown pre {
        margin: 0 0 1rem;
      }

      .markdown code {
        font-family: var(--mono);
        font-size: 0.92em;
        padding: 0.1em 0.3em;
        border-radius: 6px;
        background: rgba(73, 58, 48, 0.08);
      }

      .markdown pre {
        padding: 16px;
        overflow: auto;
        border-radius: 18px;
        background: #221c18;
        color: #f7f2ea;
      }

      .markdown pre code {
        padding: 0;
        background: transparent;
        color: inherit;
      }

      .markdown blockquote {
        padding: 0.2rem 0 0.2rem 1rem;
        border-left: 4px solid rgba(178, 76, 46, 0.35);
        color: #5f5144;
      }

      .markdown a {
        color: var(--accent);
      }

      .footnote {
        margin-top: 14px;
        color: var(--muted);
        font-size: 0.8rem;
        word-break: break-all;
      }

      @media (max-width: 900px) {
        body {
          overflow: auto;
          height: auto;
        }

        .shell {
          grid-template-columns: 1fr;
          height: auto;
          min-height: 100vh;
          overflow: visible;
        }

        .sidebar {
          max-height: 45vh;
        }

        .viewer-body {
          grid-template-rows: minmax(220px, 1fr) 14px minmax(220px, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <aside class="panel sidebar">
        <div class="sidebar-header">
          <h1>Markdown 目录浏览</h1>
          <p>选择本地目录后，递归扫描所有子目录中的 `.md` 文件。</p>
          <div class="controls">
            <button id="open-directory" class="primary-button" type="button">
              选择目录
            </button>
          </div>
          <div class="footnote" id="status">未选择目录</div>
        </div>
        <div class="file-list" id="file-list"></div>
      </aside>

      <section class="panel viewer">
        <header class="viewer-header">
          <div>
            <h2 id="viewer-title">未打开文件</h2>
            <span id="viewer-path">请选择左侧 Markdown 文件</span>
          </div>
          <div class="viewer-actions">
            <button id="save-file" class="secondary-button" type="button" disabled>
              保存
            </button>
          </div>
        </header>
        <div class="viewer-body" id="viewer-body">
          <section class="editor-pane">
            <div class="pane-header">编辑</div>
            <textarea
              id="editor-input"
              class="editor-input"
              spellcheck="false"
              placeholder="点击左侧文件后可在这里编辑 Markdown"
            ></textarea>
          </section>
          <div id="splitter" class="splitter" aria-label="拖动调整编辑区和预览区高度"></div>
          <section class="preview-pane">
            <div class="pane-header">预览</div>
            <div class="preview-scroll" id="preview-body">
              <div class="empty">点击左侧“选择目录”开始浏览本地 Markdown。</div>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script src="./renderer.js"></script>
  </body>
  </html>
